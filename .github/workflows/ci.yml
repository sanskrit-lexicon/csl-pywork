name: CI

# csl-pywork — central tooling monorepo for all CDSL dictionaries.
# Contains generate.py + Mako templates + per-dictionary scripts in v00/ and v02/.
# No external dependencies or test suite; CI validates syntax and core importability.

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-python:
    name: Lint Python scripts
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install ruff
      - name: Critical syntax errors
        # Exclude: Mako template files (.py extension with %if/%endif Mako syntax),
        # v00/distinctscripts (Python 2 legacy), v02/distinctfiles (Python 2 patterns).
        # F82 (undefined names) dropped: legacy codebase has pre-existing Python 2
        # patterns (cmp builtin) and unusual import styles that produce false positives.
        run: |
          ruff check --select=E9,F63,F7 --output-format=github \
            --exclude=v00/makotemplates \
            --exclude=v02/makotemplates \
            --exclude=v00/distinctscripts \
            --exclude=v02/distinctfiles \
            .
      - name: Style report (warnings only — large legacy codebase)
        run: |
          ruff check --output-format=github \
            --exclude=v00/makotemplates \
            --exclude=v02/makotemplates \
            --exclude=v00/distinctscripts \
            --exclude=v02/distinctfiles \
            . || true

  test-updateByLine:
    name: Unit tests — updateByLine.py + dictparms.py
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install pytest pytest-cov
      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v \
            --cov=v02 \
            --cov-report=term-missing \
            --cov-config=.coveragerc
      - name: Coverage gate (v02 directly-imported modules)
        run: python -m coverage report --fail-under=70

  smoke-import:
    name: Smoke-import core modules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install Mako (required by generate.py)
        run: pip install mako
      - name: dictparms.py imports cleanly
        run: |
          cd v02
          python -c "import dictparms; assert len(dictparms.alldictparms) > 10, 'alldictparms should have >10 entries'; print(f'OK — {len(dictparms.alldictparms)} dicts registered')"
      - name: generate.py parses without error
        run: |
          cd v02
          python -c "import ast, pathlib; ast.parse(pathlib.Path('generate.py').read_text()); print('generate.py AST OK')"
      - name: XML utilities importable
        run: |
          cd v02/utilities
          python -c "import ast, pathlib
          for f in pathlib.Path('.').glob('*.py'):
              ast.parse(f.read_text())
          print('All utility .py files parse OK')"

  validate-dtd:
    name: DTD/schema files parseable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: DTD files are valid text (not binary)
        run: |
          fail=0
          while IFS= read -r f; do
            if ! python3 -c "open('$f', encoding='utf-8').read()" 2>/dev/null; then
              echo "::error file=$f::not valid UTF-8"
              fail=1
            fi
          done < <(find . -name "*.dtd" -not -path "./.git/*")
          exit $fail

  yaml-lint:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install pyyaml
      - run: |
          python -c "
          import sys, glob, yaml
          fail = 0
          for f in glob.glob('**/*.yml', recursive=True) + glob.glob('**/*.yaml', recursive=True):
              if '.git' in f: continue
              try:
                  yaml.safe_load(open(f, encoding='utf-8'))
              except yaml.YAMLError as e:
                  print(f'::error file={f}::{e}'); fail = 1
          sys.exit(fail)
          "
